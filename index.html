<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curro Halala Cup 2026 | Live Scores</title>
    <style>
        /* PDF BRAND COLORS */
        :root {
            --navy: #002147; /* Deep Navy Blue from headers */
            --lime: #A0D61D; /* Bright Lime Green from accents */
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--gray); color: var(--navy); padding-bottom: 50px; }

        /* HEADER */
        header {
            background-color: var(--navy);
            color: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--lime);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .live-tag {
            background: red;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* REGION NAVIGATION */
        nav {
            display: flex;
            overflow-x: auto;
            background: white;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid #ddd;
        }

        nav button {
            background: var(--navy);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        nav button.active { background: var(--lime); color: var(--navy); font-weight: bold; }

        /* CONTENT AREA */
        .container { padding: 15px; max-width: 600px; margin: auto; }

        .section-title {
            margin: 20px 0 10px;
            border-left: 5px solid var(--lime);
            padding-left: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* MATCH CARDS */
        .match-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .match-time { font-size: 0.8rem; color: #666; margin-bottom: 10px; display: block; }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 5px 0;
            font-size: 1.1rem;
        }

        .score {
            font-weight: bold;
            font-size: 1.3rem;
            background: var(--navy);
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            min-width: 40px;
            text-align: center;
        }

        .watch-btn {
            display: block;
            text-align: center;
            background: var(--lime);
            color: var(--navy);
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* TABLES */
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th { background: var(--navy); color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .pos { font-weight: bold; width: 30px; }

        .footer-info {
            font-size: 0.8rem;
            text-align: center;
            padding: 20px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <div class="live-tag">LIVE UPDATES</div>
    <h1>CURRO HALALA CUP</h1>
    <p>Regional Qualifiers 2026</p>
</header>

<nav id="regionNav">
    </nav>

<div class="container">
    <a href="https://supersportschools.com/" class="watch-btn" target="_blank">📺 WATCH LIVE ON SUPERSPORT SCHOOLS</a>

    <div id="poolSection">
        <h2 class="section-title">Pool Standings</h2>
        <div id="standingsContainer"></div>
    </div>

    <div id="matchSection">
        <h2 class="section-title">Match Schedule & Scores</h2>
        <div id="matchesContainer"></div>
    </div>

    <div class="footer-info">
        Matches: 2 x 30 mins | Half-time: 10 mins [cite: 21]<br>
        Win: 2 pts | Draw: 1 pt | Loss: 0 pts [cite: 23]
    </div>
</div>

<script>
    /* ADMIN: TO UPDATE SCORES FROM YOUR PHONE
       1. Open this file on GitHub.
       2. Change the 'score1' or 'score2' numbers below.
       3. Change 'status' to "LIVE" or "FINAL".
       4. Save/Commit.
    */
    const tournamentData = {
        "Gauteng 1": {
            host: "HeronBridge College",
            pools: {
                "Pool A": [
                    { name: "Clapham High", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "Curro Cosmo City", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "The King's Linbro Park", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "Curro Parkdene", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 }
                ]
            },
            matches: [
                { time: "Fri 11:00", t1: "Curro Cosmo City", t2: "Curro Parkdene", s1: 0, s2: 0, status: "UPCOMING" },
                { time: "Fri 12:30", t1: "Clapham High", t2: "The King's Linbro Park", s1: 0, s2: 0, status: "UPCOMING" }
            ]
        },
        "Western Cape": {
            host: "Curro Century City",
            pools: {
                "Pool A": [
                    { name: "Paul Roos Gimnasium", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "Milnerton High", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "Curro Century City", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 },
                    { name: "Curro Somerset", p: 0, w: 0, d: 0, l: 0, gd: 0, pts: 0 }
                ]
            },
            matches: [
                { time: "Fri 11:00", t1: "Milnerton High", t2: "Curro Somerset West", s1: 0, s2: 0, status: "UPCOMING" }
            ]
        }
        // Add other regions (Limpopo, KZN, etc.) following the same pattern
    };

    let currentRegion = "Gauteng 1";

    function renderApp() {
        const nav = document.getElementById('regionNav');
        const standings = document.getElementById('standingsContainer');
        const matches = document.getElementById('matchesContainer');

        // Render Nav
        nav.innerHTML = Object.keys(tournamentData).map(region => 
            `<button class="${region === currentRegion ? 'active' : ''}" onclick="setRegion('${region}')">${region}</button>`
        ).join('');

        const data = tournamentData[currentRegion];

        // Render Standings
        standings.innerHTML = Object.keys(data.pools).map(poolName => `
            <h3 style="margin: 10px 0;">${poolName}</h3>
            <table>
                <tr><th>Team</th><th>GD</th><th>Pts</th></tr>
                ${data.pools[poolName].map(team => `
                    <tr><td>${team.name}</td><td>${team.gd}</td><td><b>${team.pts}</b></td></tr>
                `).join('')}
            </table>
        `).join('');

        // Render Matches
        matches.innerHTML = data.matches.map(m => `
            <div class="match-card">
                <span class="match-time">${m.time} — <b>${m.status}</b></span>
                <div class="team-row"><span>${m.t1}</span><span class="score">${m.s1}</span></div>
                <div class="team-row"><span>${m.t2}</span><span class="score">${m.s2}</span></div>
            </div>
        `).join('');
    }

    function setRegion(region) {
        currentRegion = region;
        renderApp();
    }

    renderApp();
</script>

</body>
</html>
