        /* PDF BRAND COLORS & LAYOUT VARS */
        :root {
            --navy-dark: #001A35; /* Deep Navy from references */
            --navy-med: #002147; 
            --lime: #A0D61D; /* Bright Lime Green */
            --white: #ffffff;
            --page-bg: #f4f7f6; /* Light grey background like image */
            --card-border: #e1e8ed;
            --text-main: #333333;
            --text-muted: #888888;
        }

        /* RESET & BASE STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--page-bg); color: var(--text-main); -webkit-font-smoothing: antialiased; padding-bottom: 50px;}

        /* --- MODERN HEADER (Image-inspired) --- */
        header {
            background-color: var(--navy-dark);
            color: var(--white);
            padding: 15px 20px;
            border-bottom: 4px solid var(--lime);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-area { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; color: var(--lime); }
        .logo-area span { color: var(--white); font-weight: 400; font-size: 0.9rem; margin-left: 5px;}

        .watch-live-btn {
            background-color: var(--lime);
            color: var(--navy-dark);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .watch-live-btn:hover { transform: scale(1.05); }

        .hero-title-area {
            background-color: #001226; /* Slightly darker */
            padding: 40px 20px;
            text-align: center;
        }
        .hero-title-area h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 1px;
        }
        .hero-title-area p { color: var(--text-muted); font-size: 1rem; margin-top: 5px;}

        /* --- REGION FILTER BAR --- */
        .filter-bar {
            background: var(--white);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .filter-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            overflow-x: auto;
            padding: 10px 15px;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .filter-container::-webkit-scrollbar { display: none; } /* Hide scrollbar */
 
        .region-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .region-btn:hover { background-color: #f0f0f0; }
        .region-btn.active {
            background-color: var(--navy-med);
            color: var(--lime);
            border-color: var(--navy-med);
        }

        /* --- CONTENT TABS (Dribbble Inspired) --- */
        .content-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--card-border);
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px 12px 15px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            top: 1px;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--navy-dark);
            border-bottom-color: var(--navy-dark);
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* --- MAIN CONTENT & CONTAINERS --- */
        .main-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .date-divider {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy-med);
            margin: 30px 0 15px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- MODERN MATCH CARDS (Dribbble Inspired) --- */
        .match-card {
            background: var(--white);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 15px;
            transition: box-shadow 0.3s;
            overflow: hidden;
            position: relative;
        }
        .match-card:hover {
            box-shadow: 0 8px 25px rgba(0,33,71,0.08);
        }

        .mc-body {
            display: grid;
            grid-template-columns: 1fr 120px 1fr;
            align-items: center;
            padding: 25px 20px;
            gap: 15px;
        }

        .mc-team {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--navy-dark);
        }
        .mc-team1 { text-align: right; }
        .mc-team2 { text-align: left; }
        
        .mc-score-area {
            text-align: center;
        }
        .mc-score {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--navy-dark);
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .mc-time {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy-dark);
        }
        .mc-status-text {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 5px;
            color: var(--text-muted);
        }
        .match-card.LIVE .mc-status-text {
            color: #ff4d4d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }

        /* --- POOL STANDINGS TABLES --- */
        .standings-area { margin-bottom: 40px; }
        .pool-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        @media (max-width: 768px) {
            .pool-container { grid-template-columns: 1fr; }
            .mc-body { grid-template-columns: 1fr; gap: 10px;}
            .mc-team { font-size: 1rem; }
            .mc-score { font-size: 1.8rem; }
            .hero-title-area h1 { font-size: 1.8rem; }
        }

        .pool-card {
            background: var(--white);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
        }
        .pool-title { font-weight: 800; color: var(--navy-med); text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-muted); padding: 8px; border-bottom: 2px solid #eee; font-weight: 600;}
        td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
        .col-team { font-weight: 600; color: var(--navy-dark); }
        .col-data { text-align: center; font-weight: 700; width: 40px; }

        .no-matches {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            background-color: var(--white);
            border-radius: 16px;
        }
        footer { text-align: center; padding: 40px 20px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; border-top: 1px solid #eee; margin-top: 40px;}

    </style>

    let activeRegion = "Gauteng 1";
    let activeContentTab = 'Upcoming';
    const contentTabs = ['Upcoming', 'Live', 'Finished', 'Standings'];
    const STORAGE_KEY = 'curro-halala-cup-data';

    function loadSavedData() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return;
            const saved = JSON.parse(stored);
            Object.keys(saved).forEach(region => {
                if (tournamentData[region]) {
                    tournamentData[region] = saved[region];
                }
            });
        } catch (err) {
            console.warn('Unable to load saved tournament data', err);
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tournamentData));
    }

    function updateView() {
        const nav = document.getElementById('regNav');
        const contentTabsContainer = document.getElementById('contentTabs');
        const standingsContent = document.getElementById('standingsContent');
        const matchesContent = document.getElementById('matchesContent');
        const standingsContainer = document.getElementById('standingsContainer');
        const matchesContainer = document.getElementById('matchesContainer');

        // 1. Render Nav
        nav.innerHTML = Object.keys(tournamentData).map(r => 
            `<button class="region-btn ${r === activeRegion ? 'active' : ''}" onclick="changeRegion('${r}')">${r}</button>`
        ).join('');

        // 2. Render Content Tabs
        contentTabsContainer.innerHTML = contentTabs.map(tab =>
            `<button class="tab-btn ${tab === activeContentTab ? 'active' : ''}" onclick="changeContentTab('${tab}')">${tab}</button>`
        ).join('');

        // 3. Show/Hide correct content pane
        standingsContent.classList.toggle('active', activeContentTab === 'Standings');
        matchesContent.classList.toggle('active', activeContentTab !== 'Standings');

        const regionData = tournamentData[activeRegion];

        // 4. Render content into the active pane
        if (activeContentTab === 'Standings') {
            standingsContainer.innerHTML = Object.keys(regionData.pools).map(p => `
                <div class="pool-card">
                    <div class="pool-title">${p}</div>
                    <table>
                        <tr><th>Team</th><th class="col-data">GD</th><th class="col-data">Pts</th></tr>
                        ${regionData.pools[p]
                            .sort((a,b) => (b.points - a.points) || (b.gd - a.gd) || a.name.localeCompare(b.name))
                            .map(team => `<tr><td class="col-team">${team.name}</td><td class="col-data">${team.gd}</td><td class="col-data col-pts">${team.points}</td></tr>`).join('')}
                    </table>
                </div>
            `).join('');
        } else {
            let statusToFilter = activeContentTab.toUpperCase();
            if (statusToFilter === 'FINISHED') statusToFilter = 'FINAL';

            const filteredMatches = regionData.matches.filter(m => m.st === statusToFilter);

            if (filteredMatches.length === 0) {
                matchesContainer.innerHTML = `<div class="no-matches">No ${activeContentTab.toLowerCase()} matches for this region.</div>`;
                return;
            }

            let matchesHtml = "";
            let currentDate = "";

            filteredMatches.forEach(m => {
                if (m.d !== currentDate) {
                    currentDate = m.d;
                    matchesHtml += `<div class="date-divider">${currentDate}</div>`;
                }

                let scoreContent = "";
                let specialClass = m.st;

                if(m.st === "UPCOMING") {
                    scoreContent = `
                        <div class="mc-score-area">
                            <div class="mc-time">${m.t}</div>
                        </div>`;
                } else { // LIVE or FINAL
                    scoreContent = `
                        <div class="mc-score-area">
                            <div class="mc-score"><span>${m.s1}</span><span>-</span><span>${m.s2}</span></div>
                            <div class="mc-status-text">${m.st === 'LIVE' ? 'LIVE' : 'Full Time'}</div>
                        </div>`;
                }

                matchesHtml += `
                    <div class="match-card ${specialClass}">
                        <div class="mc-body">
                            <div class="mc-team mc-team1">${m.t1}</div>
                            ${scoreContent}
                            <div class="mc-team mc-team2">${m.t2}</div>
                        </div>
                    </div>
                `;
            });
            matchesContainer.innerHTML = matchesHtml;
        }
    }

    function changeRegion(r) { 
        activeRegion = r; 
        updateView(); 
        // Auto scroll filter bar to active item on mobile
        document.querySelector('.region-btn.active').scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function changeContentTab(tab) {
        activeContentTab = tab;
        updateView();
    }

    loadSavedData();
    updateView();
</script>
