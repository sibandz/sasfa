<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halala Cup 2026 | Fixtures & Live Results</title>
    <style>
        :root {
            --navy: #1d2633;
            --navy-light: #536c86;
            --lime: #A0D61D;
            --text-main: #1d2633;
            --text-muted: #6a7789;
            --border: #e1e8ed;
            --bg: #f5f7f9;
            --white: #ffffff;
            --live: #ff4d4d;
        }

        body[data-theme="dark"] {
            --text-main: #e6f1ff;
            --text-muted: #8892b0;
            --border: #304057;
            --bg: #0a1929;
            --navy: #e6f1ff;
            --navy-light: #8892b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s;
        }

        /* --- HEADER --- */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .logo-area img {
            height: 32px;
            width: auto;
        }

        .theme-btn {
            background: none;
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .theme-btn:hover {
            background-color: var(--border);
        }

        .theme-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-main);
        }

        .theme-btn .sun-icon { display: none; }
        body[data-theme="dark"] .theme-btn .moon-icon { display: none; }
        body[data-theme="dark"] .theme-btn .sun-icon { display: block; }

        /* --- TAB NAVIGATION --- */
        .tabs {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0;
            padding: 0 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--navy);
            border-bottom-color: var(--lime);
        }

        /* --- FILTER BUTTONS --- */
        .filters {
            background: var(--white);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn:hover {
            background: var(--border);
        }

        .filter-btn.active {
            background: var(--navy);
            color: var(--white);
            border-color: var(--navy);
        }

        .filter-btn.live {
            background: rgba(255, 77, 77, 0.1);
            color: var(--live);
            border-color: var(--live);
        }

        .filter-btn.live.active {
            background: var(--live);
            color: var(--white);
        }

        /* --- MAIN CONTAINER --- */
        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 16px 60px;
        }

        /* --- LEAGUE SECTION --- */
        .league-section {
            margin-bottom: 16px;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .league-header {
            padding: 12px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .league-header:hover {
            background: rgba(0, 0, 0, 0.02);
        }

        .league-flag {
            font-size: 1.4rem;
            width: 28px;
            text-align: center;
        }

        .league-info {
            flex: 1;
        }

        .league-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .league-country {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .league-toggle {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .league-section.collapsed .league-toggle {
            transform: rotate(-90deg);
        }

        /* --- SOCIAL SECTION --- */
        .social-section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .social-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s;
            background: var(--bg);
        }

        .social-link:hover {
            background-color: var(--border);
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: var(--text-muted);
            flex-shrink: 0;
        }

        .league-matches {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .league-section.collapsed .league-matches {
            max-height: 0;
        }

        /* --- MATCH ITEM --- */
        .match-item {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 50px 1fr auto;
            gap: 12px;
            align-items: center;
            transition: background 0.2s;
        }

        .match-item:hover {
            background: var(--bg);
        }

        .match-time {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.2;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .match-team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .team-crest {
            width: 24px;
            height: 24px;
            background: var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .match-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 50px;
            text-align: right;
        }

        .score-value {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .score-status {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .score-status.live {
            color: var(--live);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* --- FOOTER --- */
        footer {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 30px 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 40px;
        }

        footer img {
            height: 40px;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .footer-link {
            margin-top: 20px;
        }

        .footer-link a {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.2s;
        }

        .footer-link a:hover {
            color: var(--navy);
        }

        /* --- MOBILE OPTIMIZED --- */
        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
            }

            .logo-area {
                font-size: 1rem;
            }

            .tabs {
                padding: 0 16px;
            }

            .tab-btn {
                padding: 14px 16px;
            }

            .filters {
                padding: 10px 16px;
            }

            .league-section {
                border-radius: 8px;
                margin-bottom: 12px;
            }

            .match-item {
                padding: 10px 12px;
                grid-template-columns: 45px 1fr auto;
                gap: 10px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo-area">
        <img src="images/sasfa_logo-removebg-preview.png" alt="SASFA">
        <span>HALALA Cup</span>
    </div>
    <button id="theme-toggle" class="theme-btn" title="Toggle theme">
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"></path></svg>
        <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.02-.39-1.41 0L3.17 5.99c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.41-1.41c.39-.39.39-1.03 0-1.41zm14.83 14.83c-.39-.39-1.02-.39-1.41 0l-1.41 1.41c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.41-1.41c.39-.39.39-1.03 0-1.41zM20.83 5.99c.39-.39.39-1.02 0-1.41l-1.41-1.41c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l1.41 1.41c.39.39 1.03.39 1.41 0zM4.58 19.41c.39-.39.39-1.02 0-1.41l-1.41-1.41c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41l1.41 1.41c.39.39 1.03.39 1.41 0z"></path></svg>
    </button>
</header>

<div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="all">All</button>
    <button class="tab-btn" data-tab="favorites">Favourites</button>
    <button class="tab-btn" data-tab="competitions">Competitions</button>
</div>

<div class="filters" id="filters">
    <button class="filter-btn live active" data-filter="live">LIVE (0)</button>
    <button class="filter-btn" data-filter="finished">Finished</button>
    <button class="filter-btn" data-filter="upcoming">Upcoming</button>
</div>

<div class="main-container">
    <div class="social-section">
        <div class="social-title">Stay Updated</div>
        <div class="social-links">
            <a href="https://www.facebook.com/curro.sport/" target="_blank" class="social-link">
                <svg viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"></path></svg>
                <span>Follow on Facebook</span>
            </a>
            <a href="https://www.instagram.com/curro.sport/" target="_blank" class="social-link">
                <svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6a3.6 3.6 0 0 0-3.6-3.6H7.6zM12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm4.5-3.5a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4z"></path></svg>
                <span>Follow on Instagram</span>
            </a>
        </div>
    </div>
    <div id="matchesContainer"><!-- Dynamically populated --></div>
</div>

<footer>
    <img src="images/sasfa_logo-removebg-preview.png" alt="SASFA">
    <p><strong>Halala Cup Regional Rules:</strong><br>
    2 x 30 min halves | 10 min break<br>
    Points: Win (3), Draw (1), Loss (0)<br>
    Top 2 teams per region qualify for National Finals.</p>
    <div class="footer-link">
        <a href="edit.html">Manager Login</a>
    </div>
</footer>

<script>
// Data structure
let tournamentData = {};
let currentFilter = 'live';

// Theme toggle
document.getElementById('theme-toggle').addEventListener('click', () => {
    const theme = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
    localStorage.setItem('theme', theme === 'dark' ? 'light' : 'dark');
});

// Load saved theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);

// Load data from API
async function loadData() {
    try {
        const response = await fetch('/api/get-data');
        const data = await response.json();
        tournamentData = data;
        renderMatches();
    } catch (error) {
        console.error('Error loading data:', error);
        tournamentData = {};
        renderMatches();
    }
}

// Render matches
function renderMatches() {
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '';

    if (!tournamentData || Object.keys(tournamentData).length === 0) {
        container.innerHTML = '<div style="padding: 40px 20px; text-align: center; color: var(--text-muted);">No matches available</div>';
        return;
    }

    // Group matches by league/region
    for (const [region, regionData] of Object.entries(tournamentData)) {
        const matches = regionData.matches || [];
        if (matches.length === 0) continue;

        const section = document.createElement('div');
        section.className = 'league-section';
        
        const header = document.createElement('div');
        header.className = 'league-header';
        header.innerHTML = `
            <div class="league-flag">⚽</div>
            <div class="league-info">
                <div class="league-name">${region}</div>
                <div class="league-country">Regional Qualification</div>
            </div>
            <div class="league-toggle">v</div>
        `;

        const matchesDiv = document.createElement('div');
        matchesDiv.className = 'league-matches';

        matches.forEach(match => {
            const matchDiv = document.createElement('div');
            matchDiv.className = 'match-item';
            
            const status = match.st || 'Upcoming';
            const isLive = status === 'LIVE';
            const time = match.t || '--:--';

            matchDiv.innerHTML = `
                <div class="match-time">
                    ${isLive ? '<div style="color: var(--live); font-weight: 700;">LIVE</div>' : time}
                </div>
                <div class="match-teams">
                    <div class="match-team">
                        <div class="team-crest">${(match.t1 || '?').charAt(0)}</div>
                        <div>${match.t1 || 'Team 1'}</div>
                    </div>
                    <div class="match-team">
                        <div class="team-crest">${(match.t2 || '?').charAt(0)}</div>
                        <div>${match.t2 || 'Team 2'}</div>
                    </div>
                </div>
                <div class="match-score">
                    <div class="score-value">${match.s1 || 0}<span style="margin: 0 4px;">-</span>${match.s2 || 0}</div>
                    <div class="score-status ${isLive ? 'live' : ''}">${status}</div>
                </div>
            `;

            matchesDiv.appendChild(matchDiv);
        });

        section.appendChild(header);
        section.appendChild(matchesDiv);
        container.appendChild(section);

        // Toggle expand/collapse
        header.addEventListener('click', () => {
            section.classList.toggle('collapsed');
        });
    }
}

// Initialize
loadData();
</script>

</body>
</html>
